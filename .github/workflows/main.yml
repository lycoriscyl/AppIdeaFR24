name: Update Flight Data and Report

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  push:
    branches:
      - main # Or your default branch
      # Only run on push if specific files related to the scripts or db change, to avoid unnecessary runs.
      # Example:
      # paths:
      #  - 'adsb_fetcher.py'
      #  - 'db_manager.py'
      #  - 'report_generator.py'
  workflow_dispatch: # Allows manual triggering

jobs:
  update_data_and_report:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.10' # Specify your Python version

      # Optional: Install dependencies if you have a requirements.txt
      # - name: Install dependencies
      #   run: |
      #     python -m pip install --upgrade pip
      #     if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run adsb_fetcher.py to update flight_log.db
        run: python adsb_fetcher.py

      - name: Run report_generator.py to generate report.html
        run: python report_generator.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add flight_log.db flight_sessions.db report.html operating_costs.csv
          # Check if there are changes to commit
          if ! git diff --staged --quiet; then
            git commit -m "Automated update: flight data and report"
            git push
          else
            echo "No changes to commit."
          fi
        # Add error handling for git operations if necessary
```
